<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Lirios &amp; Orquídeas · Para Mey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400;1,500&display=swap" rel="stylesheet"/>
  <style>
  :root{
    --bg:#03000B;--gold:#FFD600;--gold2:#FFA000;
    --texto:#FFF8F0;
    --display:'Cinzel',serif;--verso:'Cormorant Garamond',serif;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;background:var(--bg);-webkit-font-smoothing:antialiased;}
  body{overflow-x:hidden;}

  /* ── OVERLAY ── */
  #overlay{
    position:fixed;inset:0;z-index:900;
    background:radial-gradient(ellipse 90% 80% at 50% 55%,#140930,#07001A 55%,#02000A);
    display:flex;align-items:center;justify-content:center;
    transition:opacity .6s ease;
  }
  #overlay.hide{opacity:0;pointer-events:none;}
  .ov-petals{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
  .ov-petal{
    position:absolute;top:-20px;
    border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
    pointer-events:none;animation:petalFall linear infinite;
  }
  @keyframes petalFall{
    0%{transform:translateY(0) rotate(0);opacity:0;}
    8%{opacity:.7;}90%{opacity:.3;}
    100%{transform:translateY(110vh) rotate(540deg);opacity:0;}
  }
  .ov-centro{
    position:relative;z-index:2;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:1.8rem;padding:2rem;
  }
  .ov-fecha{
    font-family:var(--display);font-size:clamp(.8rem,2.5vw,1rem);
    letter-spacing:.45em;color:rgba(180,100,255,.8);text-transform:uppercase;
  }
  .ov-nombre{
    font-family:var(--display);font-size:clamp(3.8rem,17vw,9rem);
    font-weight:400;line-height:1;color:var(--texto);letter-spacing:.04em;
  }
  .ov-nombre em{
    display:block;font-style:italic;color:var(--gold);font-size:1.38em;
    text-shadow:0 0 28px rgba(255,210,0,.8),0 0 70px rgba(255,140,0,.35);
  }
  .ov-sub{
    font-family:var(--verso);font-style:italic;
    font-size:clamp(1.1rem,4vw,1.45rem);color:rgba(220,170,255,.5);letter-spacing:.1em;
  }
  #btn-abrir{
    background:none;border:2px solid rgba(255,210,0,.4);border-radius:50px;
    cursor:pointer;color:var(--gold);
    display:flex;flex-direction:column;align-items:center;gap:.5rem;padding:1rem 2.4rem;
    transition:transform .4s cubic-bezier(.34,1.56,.64,1),border-color .3s,background .3s;
    -webkit-tap-highlight-color:transparent;
  }
  #btn-abrir:hover,#btn-abrir:active{
    transform:scale(1.08);border-color:rgba(255,210,0,.8);background:rgba(255,210,0,.07);
  }
  .btn-txt{
    font-family:var(--display);font-size:clamp(.8rem,2.5vw,1rem);
    letter-spacing:.4em;text-transform:uppercase;color:var(--gold);
  }
  .btn-svg{animation:breathe 2.8s ease-in-out infinite;}
  @keyframes breathe{
    0%,100%{filter:drop-shadow(0 0 6px rgba(255,210,0,.5));}
    50%{filter:drop-shadow(0 0 18px rgba(255,210,0,.95));}
  }

  /* ── MAIN ── */
  #main{display:none;flex-direction:column;min-height:100dvh;}
  #main.show{display:flex;}
  #part-cv{position:fixed;inset:0;pointer-events:none;z-index:0;}

  /* ── JARDÍN ── */
  #jardin{
    position:relative;z-index:1;width:100%;
    aspect-ratio:400/700;max-height:95vh;overflow:hidden;
    background:
      radial-gradient(ellipse 85% 50% at 50% 100%,rgba(80,20,130,.35),transparent 65%),
      linear-gradient(to bottom,#03000B,#08001C);
  }
  #ramo{position:absolute;inset:0;width:100%;height:100%;display:block;}

  /*
   ╔══════════════════════════════════════════════════════╗
   ║  FLOR ANIMATION — CSS ONLY                           ║
   ║  Regla crítica: los pétalos tienen SVG               ║
   ║  transform="rotate(X)" que NO debe ser tocado        ║
   ║  por ninguna clase CSS con transform/transform-box.  ║
   ║  La animación de entrada va en .bloom-inner          ║
   ║  usando SOLO opacity + scale SIN transform-box.      ║
   ╚══════════════════════════════════════════════════════╝
  */
  .bloom-inner{opacity:0;}

  @keyframes florAbrir{
    0%  {opacity:0;transform:scale(0);}
    55% {opacity:1;transform:scale(1.1);}
    78% {transform:scale(.94);}
    100%{opacity:1;transform:scale(1);}
  }
  /* transform-origin en coordenadas SVG absolutas via svgOrigin equivalente:
     usamos el atributo style directamente desde JS para cada flor */
  .bloom-inner.abierta{
    animation:florAbrir 1.2s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  .glow-halo{opacity:0;transition:opacity 1s ease .15s;}
  .glow-halo.abierta{opacity:1;}

  /* Balanceo suave del bloom-inner — SIN transform-box para no afectar pétalos */
  @keyframes vaiven{
    0%,100%{transform:scale(1) rotate(0deg);}
    50%    {transform:scale(1) rotate(1.5deg);}
  }
  .bloom-inner.viva{
    animation:vaiven 4s ease-in-out infinite;
  }

  /* ── MENSAJE ── */
  #mensaje{
    position:relative;z-index:1;
    background:linear-gradient(to bottom,#08001C,#03000B);
    display:flex;align-items:center;justify-content:center;
    padding:4rem 2rem 5rem;flex:1;
  }
  .msg-inner{max-width:580px;width:100%;text-align:center;}
  .linea-deco{
    height:1px;
    background:linear-gradient(to right,transparent,rgba(160,40,255,.5) 20%,rgba(255,180,0,.65) 50%,rgba(160,40,255,.5) 80%,transparent);
    position:relative;margin:1rem 0 1.3rem;
  }
  .linea-deco::after{
    content:'✦ ✦ ✦';position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%);font-size:.5rem;letter-spacing:.5rem;
    color:rgba(255,180,0,.65);background:#03000B;padding:0 .6rem;
  }
  .linea-deco.bot::after{content:'✦';}
  .v-sep{width:32px;height:1px;background:rgba(160,40,255,.4);margin:.9rem auto 1.1rem;opacity:0;transition:opacity .6s;}
  .v-sep.vis{opacity:1;}
  .v{
    font-family:var(--verso);font-weight:300;
    font-size:clamp(1.5rem,6vw,2rem);line-height:1.9;color:transparent;
  }
  .v.vd{font-family:var(--display);font-size:clamp(1.3rem,5.5vw,1.75rem);font-weight:400;font-style:italic;line-height:1.7;letter-spacing:.04em;}
  .vsig{font-family:var(--display);font-size:clamp(.68rem,2vw,.88rem);letter-spacing:.38em;text-transform:uppercase;color:transparent;margin-top:1rem;display:block;}
  .v.vis{color:rgba(255,248,240,.92);}
  .v.vd.vis{color:var(--gold);text-shadow:0 0 20px rgba(255,210,0,.45);}
  .vsig.vis{color:rgba(160,90,220,.7);}

  @media(min-width:700px){
    #jardin{width:min(460px,62vw);margin:0 auto;max-height:88vh;}
    .v{font-size:clamp(1.4rem,2.3vw,1.9rem);}
    .v.vd{font-size:clamp(1.3rem,2vw,1.7rem);}
  }
  </style>
</head>
<body>

<div id="overlay">
  <div class="ov-petals" id="ov-petals"></div>
  <div class="ov-centro">
    <p class="ov-fecha">21 · III · MMXXVI</p>
    <h1 class="ov-nombre">Para<br/><em>Mey</em></h1>
    <p class="ov-sub">Un jardín efímero en tu honor</p>
    <button id="btn-abrir" type="button">
      <svg class="btn-svg" width="44" height="44" viewBox="0 0 44 44" fill="none">
        <circle cx="22" cy="22" r="20" stroke="#FFD600" stroke-width="1.4"/>
        <path d="M15 22 L21 28 L33 15" stroke="#FFD600" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="btn-txt">Abrir</span>
    </button>
  </div>
</div>

<div id="main">
  <canvas id="part-cv"></canvas>

  <!--
  ╔══════════════════════════════════════════════════════════╗
  ║ viewBox 0 0 400 700 — móvil portrait                    ║
  ║ LAZO: (200,638)                                         ║
  ║ Flores:                                                 ║
  ║   fl4 HÉROE  translate(200,136)                        ║
  ║   fl3 lirio  translate(148,202)                        ║
  ║   fl5 lirio  translate(252,202)                        ║
  ║   fl2 orq    translate( 90,276)                        ║
  ║   fl6 orq    translate(310,276)                        ║
  ║   fl1 lirio  translate( 48,366)                        ║
  ║   fl7 lirio  translate(352,366)                        ║
  ╚══════════════════════════════════════════════════════════╝

  REGLA SVG:
  - Cada pétalo tiene su path con la PUNTA en Y negativo (arriba)
    y la BASE en Y=0 (origen del grupo de la flor)
  - transform="rotate(Xdeg)" rota alrededor del origen (0,0)
    que es el centro de la flor = punta del tallo
  - Los 6 pétalos a 0°/60°/120°/180°/240°/300° se abren en abanico
  - NINGUNA clase CSS con transform-box toca a los path de pétalos
  -->
  <section id="jardin">
    <svg id="ramo" viewBox="0 0 400 700"
         xmlns="http://www.w3.org/2000/svg"
         preserveAspectRatio="xMidYMid meet">
      <defs>
        <!-- Lily gradients: blanco-crema centro → dorado → naranja → rojo -->
        <radialGradient id="gL1" cx="50%" cy="88%" r="88%">
          <stop offset="0%"  stop-color="#FFFCE6"/>
          <stop offset="12%" stop-color="#FFE000"/>
          <stop offset="36%" stop-color="#FFA800"/>
          <stop offset="66%" stop-color="#FF5500"/>
          <stop offset="100%" stop-color="#C01800"/>
        </radialGradient>
        <radialGradient id="gL2" cx="48%" cy="85%" r="85%">
          <stop offset="0%"  stop-color="#FFFFF0"/>
          <stop offset="14%" stop-color="#FFD000"/>
          <stop offset="38%" stop-color="#FF8C00"/>
          <stop offset="68%" stop-color="#FF3800"/>
          <stop offset="100%" stop-color="#A81600"/>
        </radialGradient>
        <radialGradient id="gL3" cx="52%" cy="86%" r="86%">
          <stop offset="0%"  stop-color="#FFFDE7"/>
          <stop offset="16%" stop-color="#FFE040"/>
          <stop offset="42%" stop-color="#FFB000"/>
          <stop offset="70%" stop-color="#FF5C00"/>
          <stop offset="100%" stop-color="#BC2000"/>
        </radialGradient>
        <!-- Orchid petals/sepals: dorado-amarillo cálido -->
        <radialGradient id="gOP" cx="42%" cy="72%" r="80%">
          <stop offset="0%"  stop-color="#FFFDE7"/>
          <stop offset="20%" stop-color="#FFE000"/>
          <stop offset="50%" stop-color="#FFA000"/>
          <stop offset="82%" stop-color="#FF5500"/>
          <stop offset="100%" stop-color="#CC2800"/>
        </radialGradient>
        <!-- Orchid labellum: gold→purple profundo -->
        <radialGradient id="gLab1" cx="50%" cy="20%" r="75%">
          <stop offset="0%"  stop-color="#FFF9C4"/>
          <stop offset="14%" stop-color="#FFE000"/>
          <stop offset="32%" stop-color="#EA40FB"/>
          <stop offset="58%" stop-color="#8E24AA"/>
          <stop offset="88%" stop-color="#4A148C"/>
          <stop offset="100%" stop-color="#2E0057"/>
        </radialGradient>
        <radialGradient id="gLab2" cx="50%" cy="20%" r="75%">
          <stop offset="0%"  stop-color="#FFF9C4"/>
          <stop offset="14%" stop-color="#FFD600"/>
          <stop offset="32%" stop-color="#F06292"/>
          <stop offset="58%" stop-color="#AD1457"/>
          <stop offset="88%" stop-color="#7B1FA2"/>
          <stop offset="100%" stop-color="#38006b"/>
        </radialGradient>
        <!-- Lily center -->
        <radialGradient id="gCL" cx="50%" cy="40%" r="60%">
          <stop offset="0%"  stop-color="#FFF9C4"/>
          <stop offset="30%" stop-color="#FFE082"/>
          <stop offset="62%" stop-color="#FF8F00"/>
          <stop offset="100%" stop-color="#BF360C"/>
        </radialGradient>
        <!-- Orchid column -->
        <radialGradient id="gCO" cx="50%" cy="40%" r="60%">
          <stop offset="0%"  stop-color="#FFFFFF"/>
          <stop offset="35%" stop-color="#FFF176"/>
          <stop offset="68%" stop-color="#FFD600"/>
          <stop offset="100%" stop-color="#F57F17"/>
        </radialGradient>
        <!-- Halos -->
        <radialGradient id="gHO" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#FFD600" stop-opacity=".6"/>
          <stop offset="50%" stop-color="#FF8F00" stop-opacity=".2"/>
          <stop offset="100%" stop-color="#FF6F00" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="gHP" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#EA80FC" stop-opacity=".55"/>
          <stop offset="55%" stop-color="#AA00FF" stop-opacity=".15"/>
          <stop offset="100%" stop-color="#6A1B9A" stop-opacity="0"/>
        </radialGradient>
        <!-- Stems / leaves -->
        <linearGradient id="gStem" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#2E7D32"/>
          <stop offset="50%"  stop-color="#4CAF50"/>
          <stop offset="100%" stop-color="#1B5E20"/>
        </linearGradient>
        <linearGradient id="gLeaf" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"  stop-color="#66BB6A"/>
          <stop offset="100%" stop-color="#1B5E20"/>
        </linearGradient>
        <!-- Bow -->
        <radialGradient id="gBow" cx="50%" cy="35%" r="65%">
          <stop offset="0%"  stop-color="#CE93D8"/>
          <stop offset="45%" stop-color="#9C27B0"/>
          <stop offset="100%" stop-color="#4A148C"/>
        </radialGradient>
        <!-- Filters -->
        <filter id="fSoft" x="-25%" y="-25%" width="150%" height="150%">
          <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="rgba(0,0,0,.5)"/>
        </filter>
        <filter id="fGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="fGlowLg" x="-70%" y="-70%" width="240%" height="240%">
          <feGaussianBlur stdDeviation="9" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="fGlowXs" x="-35%" y="-35%" width="170%" height="170%">
          <feGaussianBlur stdDeviation="2.2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
<!-- LILY PETAL HERO (más grande) -->
        <symbol id="sPetalHero" viewBox="-38 -134 76 144" overflow="visible">
          <path d="M0,0
            C-10,-2 -30,-15 -35,-46
            C-40,-76 -28,-110 0,-130
            C28,-110 40,-76 35,-46
            C30,-15 10,-2 0,0Z"/>
        </symbol>

        <!-- ORCHID SEPAL (estrecho, nervura central) -->
        <symbol id="sSepOrq" viewBox="-14 -80 28 88" overflow="visible">
          <path d="M0,0
            C-5,-2 -12,-14 -12,-34
            C-12,-56 -6,-70 0,-76
            C6,-70 12,-56 12,-34
            C12,-14 5,-2 0,0Z"/>
        </symbol>

        <!-- ORCHID WING PETAL (ancho, redondeado) -->
        <symbol id="sPetOrqWing" viewBox="-62 -80 124 90" overflow="visible">
          <path d="M0,0
            C-12,-2 -36,-8 -52,-28
            C-64,-46 -58,-68 -40,-76
            C-26,-82 -10,-70 0,-58
            C10,-70 26,-82 40,-76
            C58,-68 64,-46 52,-28
            C36,-8 12,-2 0,0Z"/>
        </symbol>

        <!-- ORCHID LABELLUM (labelo realista) -->
        <symbol id="sLabOrq" viewBox="-44 -52 88 96" overflow="visible">
          <path d="M0,0
            C-16,-2 -38,-8 -40,-22
            C-42,-36 -30,-48 -16,-48
            C-8,-48 -2,-40 0,-32
            C2,-40 8,-48 16,-48
            C30,-48 42,-36 40,-22
            C38,-8 16,-2 0,0
            C-4,8 -6,20 0,28
            C6,20 4,8 0,0Z"/>
        </symbol>
      </defs>

      <!-- ══════════════════════════════════
           TALLOS
      ══════════════════════════════════ -->
      <g id="tallos-grupo">


        <!-- t1 → fl1 (50,282) -->
        <path class="tallo" id="t1"
          d="M200,620 C176,578 130,510 94,442 C74,398 60,336 50,282"
          stroke="url(#gStem)" stroke-width="2.6" fill="none" stroke-linecap="round"
          stroke-dasharray="400" stroke-dashoffset="400"/>
        <path class="hoja" id="h1a"
          d="M72,400 C56,388 46,368 59,355 C72,342 88,356 84,374Z"
          fill="url(#gLeaf)" opacity="0"/>
        <path class="hoja" id="h1b"
          d="M106,460 C122,444 141,436 147,452 C153,468 137,479 121,474Z"
          fill="url(#gLeaf)" opacity="0"/>

        <!-- t2 → fl2 (94,238) -->
        <path class="tallo" id="t2"
          d="M200,620 C186,566 160,498 136,424 C118,370 106,308 94,238"
          stroke="url(#gStem)" stroke-width="2.9" fill="none" stroke-linecap="round"
          stroke-dasharray="430" stroke-dashoffset="430"/>
        <path class="hoja" id="h2a"
          d="M112,356 C100,340 94,318 106,306 C118,294 132,311 128,329Z"
          fill="url(#gLeaf)" opacity="0"/>

        <!-- t3 → fl3 (152,190) -->
        <path class="tallo" id="t3"
          d="M200,620 C196,556 182,484 170,404 C162,346 158,278 152,190"
          stroke="url(#gStem)" stroke-width="3.1" fill="none" stroke-linecap="round"
          stroke-dasharray="440" stroke-dashoffset="440"/>
        <path class="hoja" id="h3a"
          d="M160,360 C174,346 192,340 196,355 C200,370 182,382 168,375Z"
          fill="url(#gLeaf)" opacity="0"/>
        <path class="hoja" id="h3b"
          d="M163,452 C149,440 141,418 154,408 C167,398 181,412 177,431Z"
          fill="url(#gLeaf)" opacity="0"/>

        <!-- t4 → fl4 HÉROE (200,148) — tallo recto visible -->
        <path class="tallo" id="t4"
          d="M200,620 C200,546 200,460 200,380 C200,298 200,228 200,148"
          stroke="url(#gStem)" stroke-width="4.2" fill="none" stroke-linecap="round"
          stroke-dasharray="472" stroke-dashoffset="472"/>
        <path class="hoja" id="h4a"
          d="M200,380 C217,365 236,360 240,375 C244,390 224,402 207,396Z"
          fill="url(#gLeaf)" opacity="0"/>
        <path class="hoja" id="h4b"
          d="M200,480 C183,468 174,446 186,436 C198,426 215,440 211,459Z"
          fill="url(#gLeaf)" opacity="0"/>

        <!-- t5 → fl5 (248,190) -->
        <path class="tallo" id="t5"
          d="M200,620 C204,556 218,484 230,404 C238,346 242,278 248,190"
          stroke="url(#gStem)" stroke-width="3.1" fill="none" stroke-linecap="round"
          stroke-dasharray="440" stroke-dashoffset="440"/>
        <path class="hoja" id="h5a"
          d="M240,360 C226,346 208,340 204,355 C200,370 218,382 232,375Z"
          fill="url(#gLeaf)" opacity="0"/>

        <!-- t6 → fl6 (306,238) -->
        <path class="tallo" id="t6"
          d="M200,620 C214,566 240,498 264,424 C282,370 294,308 306,238"
          stroke="url(#gStem)" stroke-width="2.9" fill="none" stroke-linecap="round"
          stroke-dasharray="430" stroke-dashoffset="430"/>
        <path class="hoja" id="h6a"
          d="M288,356 C300,340 306,318 294,306 C282,294 268,311 272,329Z"
          fill="url(#gLeaf)" opacity="0"/>

        <!-- t7 → fl7 (350,282) -->
        <path class="tallo" id="t7"
          d="M200,620 C224,578 270,510 306,442 C326,398 340,336 350,282"
          stroke="url(#gStem)" stroke-width="2.6" fill="none" stroke-linecap="round"
          stroke-dasharray="400" stroke-dashoffset="400"/>
        <path class="hoja" id="h7a"
          d="M328,400 C344,388 354,368 341,355 C328,342 312,356 316,374Z"
          fill="url(#gLeaf)" opacity="0"/>
        <path class="hoja" id="h7b"
          d="M294,460 C278,444 259,436 253,452 C247,468 263,479 279,474Z"
          fill="url(#gLeaf)" opacity="0"/>

        <!-- LAZO (200,620) -->
        <g id="lazo" opacity="0">
          <path d="M200,620 C178,600 162,584 168,572 C174,560 186,567 196,584 C198,592 200,606 200,620Z"
            fill="url(#gBow)" filter="url(#fGlowXs)"/>
          <path d="M200,620 C222,600 238,584 232,572 C226,560 214,567 204,584 C202,592 200,606 200,620Z"
            fill="url(#gBow)" filter="url(#fGlowXs)"/>
          <ellipse cx="200" cy="620" rx="11" ry="9" fill="#CE93D8" filter="url(#fGlowXs)"/>
        </g>
        </g>

      <!-- ══════════════════════════════════════════════
           FLORES
           Cada bloom-g tiene transform="translate(cx,cy)"
           bloom-inner es el que anima (sólo opacity+scale)
           Pétalos: SVG rotate() distribuye en abanico
           SIN transform-box en path individuales
      ══════════════════════════════════════════════ -->


      <!-- fl1 lirio (48,366) -->
      <g class="flor" id="fl1">
        <ellipse class="glow-halo" cx="50" cy="282" rx="64" ry="64" fill="url(#gHO)" opacity="0"/>
        <g class="bloom-g" transform="translate(50,282)">
          <g class="bloom-inner" opacity="0" style="transform-origin:0px 0px">
